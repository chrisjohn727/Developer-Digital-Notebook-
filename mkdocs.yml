site_name: Developer Digital Notebook
site_description: API documentation site built with MkDocs and Material theme
site_author: Christu RJ
site_url: https://chrisjohn83.github.io/Developer-Digital-Notebook/
repo_url: https://github.com/chrisjohn83/Developer-Digital-Notebook
repo_name: chrisjohn83/Developer-Digital-Notebook

theme:
  name: material
  palette:
    scheme: default
    primary: orange
    accent: cyan
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Projects: projects.md
  - About: about.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
